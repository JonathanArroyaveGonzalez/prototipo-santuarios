<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Imagen generica de evento</title>
  <desc id="desc">Fondo abstracto para representar un evento de memoria.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b4a3b"/>
      <stop offset="60%" stop-color="#3f6a56"/>
      <stop offset="100%" stop-color="#b2916f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff2d8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff2d8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#glow)"/>
  <g fill="none" stroke="#f3e2c4" stroke-opacity="0.35">
    <path d="M-40 560 C220 430 420 680 700 530 C930 410 1110 620 1260 520" stroke-width="4"/>
    <path d="M-20 610 C180 500 430 760 700 620 C940 500 1100 710 1240 630" stroke-width="2.5"/>
  </g>
  <g fill="#fdf7ea" fill-opacity="0.9">
    <circle cx="220" cy="200" r="8"/>
    <circle cx="260" cy="240" r="5"/>
    <circle cx="930" cy="170" r="7"/>
    <circle cx="980" cy="220" r="4"/>
  </g>
</svg>
